<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פאנל ניהול - בר המצווה של הראל</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="admin-login">
    <div class="login-card">
      <div class="login-icon">⚙</div>
      <h1>פאנל ניהול</h1>
      <p>הכנס סיסמה כדי להמשיך</p>
      <form id="login-form">
        <input type="password" id="admin-password" placeholder="סיסמה" autocomplete="off">
        <span class="error-msg" id="login-error">סיסמה שגויה</span>
        <button type="submit" class="btn btn-primary">כניסה</button>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" style="display:none;">

    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header-content">
        <div>
          <h1>פאנל ניהול</h1>
          <p>בר המצווה של הראל</p>
        </div>
        <div class="admin-header-actions">
          <a href="index.html" class="btn btn-secondary btn-sm">דף הברכות</a>
          <a href="screen.html" class="btn btn-secondary btn-sm">מצגת</a>
          <button class="btn btn-secondary btn-sm" id="show-qr-btn">QR מצגת</button>
          <a href="book.html" class="btn btn-secondary btn-sm">ספר ברכות</a>
          <button class="btn btn-secondary btn-sm" id="logout-btn">התנתק</button>
        </div>
      </div>
    </header>

    <!-- Stats -->
    <div class="admin-container">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="stat-total">0</span>
          <span class="stat-label">סה"כ ברכות</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-today">0</span>
          <span class="stat-label">היום</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-storage">0</span>
          <span class="stat-label">נפח (KB)</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-popular">-</span>
          <span class="stat-label">עיצוב פופולרי</span>
        </div>
      </div>

      <!-- Actions Bar -->
      <div class="admin-actions">
        <button class="btn btn-secondary btn-sm" id="clear-btn">מחק הכל</button>
      </div>

      <!-- Blessings List -->
      <div class="admin-section">
        <div class="section-header">
          <h2>ברכות</h2>
          <span class="section-count" id="list-count">0</span>
        </div>
        <div id="blessings-loader" class="admin-loader">
          <div class="loader-spinner"></div>
          <p>טוען ברכות...</p>
        </div>
        <div id="blessings-list" class="blessings-list"></div>
        <div id="empty-admin" class="admin-empty" style="display:none;">
          <p>אין ברכות עדיין</p>
        </div>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <!-- QR Modal -->
  <div id="qr-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:none; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:16px; padding:32px; text-align:center; max-width:350px;">
      <h3 style="font-family:'Assistant',sans-serif; color:#1a1a2e; margin-bottom:8px;">📱 ניהול מהטלפון</h3>
      <p style="color:#666; font-size:0.85rem; margin-bottom:16px;">סרקו עם הטלפון כדי לנהל ברכות למסך</p>
      <div id="qr-screen-canvas" style="display:inline-block;"></div>
      <p style="color:#999; font-size:0.8rem; margin-top:12px;">hchc.co.il/admin.html</p>
      <button onclick="document.getElementById('qr-modal').style.display='none'" style="margin-top:16px; padding:8px 24px; background:var(--gold); color:#1a1a2e; border:none; border-radius:8px; font-family:'Assistant',sans-serif; font-weight:700; cursor:pointer;">סגור</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.getElementById('show-qr-btn').addEventListener('click', function() {
      const modal = document.getElementById('qr-modal');
      modal.style.display = 'flex';
      const container = document.getElementById('qr-screen-canvas');
      if (!container.dataset.rendered) {
        new QRCode(container, {
          text: 'https://hchc.co.il/screen.html',
          width: 250,
          height: 250,
          colorDark: '#0c1425',
          colorLight: '#ffffff'
        });
        container.dataset.rendered = '1';
      }
    });
  </script>
</body>
</html>
