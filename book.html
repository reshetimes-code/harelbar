<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ספר הברכות - בר המצווה של הראל</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body class="book-page">

  <canvas id="confetti-canvas"></canvas>

  <!-- Header -->
  <div class="book-header">
    <h1>ספר הברכות</h1>
    <p class="subtitle">בר המצווה של הראל</p>
    <p class="stats" id="stats"></p>
  </div>

  <!-- Controls -->
  <div class="book-controls">
    <button class="btn btn-primary" id="download-btn" style="width: auto;">
      הורד PDF
    </button>
    <select id="layout-select">
      <option value="1">כרטיס אחד בעמוד</option>
      <option value="2">שני כרטיסים בעמוד</option>
    </select>
  </div>

  <!-- Progress -->
  <div class="progress-container" id="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <p class="progress-text" id="progress-text">מכין PDF...</p>
  </div>

  <!-- Hidden Cover for PDF -->
  <div id="pdf-cover" style="position:fixed; left:0; top:0; width:794px; height:1123px; background:#1a2744; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Assistant',sans-serif; box-sizing:border-box; border:4px solid #d4a853; padding:40px; z-index:-1; opacity:0;">
    <div style="border:2px solid #d4a853; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; box-sizing:border-box;">
      <h1 style="color:#d4a853; font-size:56px; font-weight:800; margin:0;">ספר הברכות</h1>
      <p style="color:#f0d68a; font-size:36px; font-weight:700; margin:30px 0 0;">בר המצווה של הראלי</p>
      <p id="cover-date" style="color:#c8c8c8; font-size:24px; margin:40px 0 0;"></p>
      <p id="cover-count" style="color:#c8c8c8; font-size:20px; margin:20px 0 0;"></p>
      <p style="color:#d4a853; font-size:80px; margin:50px 0 0;">✡</p>
    </div>
  </div>

  <!-- Cards Preview Grid -->
  <div class="cards-grid" id="cards-grid"></div>

  <!-- Empty -->
  <div class="container" id="empty-book" style="display:none; text-align:center; padding: 80px 20px;">
    <p style="font-size: 1.1rem; color: var(--text-muted);">אין ברכות עדיין</p>
    <a href="index.html" class="btn btn-primary" style="margin-top: 20px; width: auto; display: inline-flex;">
      חזור לדף הברכות
    </a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/book.js"></script>
  <script src="js/confetti.js"></script>
</body>
</html>
