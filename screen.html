<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מסך מצגת - בר המצווה של הראל</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      cursor: none;
    }

    .screen-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .screen-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .screen-card {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      transform: scale(1.05);
      filter: blur(8px);
      transition: opacity 1.5s ease, transform 1.5s ease, filter 1.5s ease;
      overflow: hidden;
    }

    .screen-card.active {
      opacity: 1;
      z-index: 2;
      transform: scale(1);
      filter: blur(0);
    }

    .screen-card .blessing-card {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
    }

    .waiting-screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0a1020 0%, #0c1425 100%);
      color: var(--gold-light);
    }

    .waiting-screen h1 {
      font-family: 'Assistant', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .waiting-screen p {
      color: var(--text-muted);
      font-size: 1.2rem;
    }

    .swal2-popup.swal-blessing {
      background: rgba(17, 28, 50, 0.95) !important;
      border: 1px solid rgba(184,149,62,0.3) !important;
      border-radius: 16px !important;
      backdrop-filter: blur(12px);
      color: #fff !important;
    }

    .swal2-title {
      color: var(--gold-light) !important;
      font-family: 'Assistant', sans-serif !important;
      font-weight: 700 !important;
    }

    .swal2-html-container {
      color: rgba(255,255,255,0.7) !important;
      font-family: 'Assistant', sans-serif !important;
    }

    body.show-cursor { cursor: default; }
  </style>
</head>
<body>

  <div class="screen-container" id="screen">
    <div class="waiting-screen" id="waiting">
      <h1>ברכות לכבוד הראל</h1>
      <p style="margin-bottom:32px;">סרקו את הקוד וכתבו ברכה</p>
      <div id="waiting-qr" style="background:#fff; padding:16px; border-radius:16px; display:inline-block;"></div>
      <p style="margin-top:16px; color:rgba(255,255,255,0.3); font-size:0.9rem;">hchc.co.il</p>
    </div>

    <!-- Permanent QR in corner during slideshow -->
    <div id="qr-floating" style="display:none; position:fixed; bottom:24px; left:24px; z-index:50;">
      <div style="background:#fff; border-radius:12px; padding:8px; box-shadow:0 4px 20px rgba(0,0,0,0.4);">
        <div id="floating-qr-mini"></div>
      </div>
      <p style="text-align:center; color:rgba(255,255,255,0.4); font-size:0.7rem; margin-top:6px;">סרקו וכתבו ברכה</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/templates.js"></script>
  <script>
  (function() {
    const screen = document.getElementById('screen');
    const waiting = document.getElementById('waiting');

    let blessings = [];
    let knownIds = new Set();
    let currentIndex = -1;
    let cardA = null;
    let cardB = null;
    let activeCard = 'A';
    let autoTimer = null;
    const INTERVAL = 8000;

    cardA = createSlot('card-a');
    cardB = createSlot('card-b');

    function createSlot(id) {
      const div = document.createElement('div');
      div.className = 'screen-card';
      div.id = id;
      screen.appendChild(div);
      return div;
    }

    function showCard(blessing) {
      const html = renderCard(blessing);
      const next = activeCard === 'A' ? cardB : cardA;
      const current = activeCard === 'A' ? cardA : cardB;

      next.innerHTML = html;

      requestAnimationFrame(() => {
        current.classList.remove('active');
        requestAnimationFrame(() => {
          next.classList.add('active');
          activeCard = activeCard === 'A' ? 'B' : 'A';
        });
      });
    }

    function nextCard() {
      if (blessings.length === 0) return;
      currentIndex = (currentIndex + 1) % blessings.length;
      showCard(blessings[currentIndex]);
    }

    function startAutoPlay() {
      if (autoTimer) clearInterval(autoTimer);
      autoTimer = setInterval(nextCard, INTERVAL);
    }

    function showNewBlessingAlert(blessing) {
      Swal.fire({
        title: 'ברכה חדשה!',
        html: `<strong>${escapeHtml(blessing.name)}</strong> שלח/ה ברכה`,
        timer: 4000,
        timerProgressBar: true,
        showConfirmButton: false,
        position: 'top',
        toast: true,
        customClass: { popup: 'swal-blessing' }
      });
    }

    // Real-time listener — Firebase (only approved blessings)
    onBlessingsChanged(function(allBlessings) {
      const approved = allBlessings.filter(b => b.status === 'approved');
      const newOnes = approved.filter(b => !knownIds.has(b.id));

      // Update local state
      blessings = approved;
      approved.forEach(b => knownIds.add(b.id));

      if (blessings.length === 0) {
        waiting.style.display = 'flex';
        return;
      }

      // Hide waiting, show floating QR
      waiting.style.display = 'none';
      document.getElementById('qr-floating').style.display = 'block';

      // If first load, start slideshow
      if (currentIndex === -1) {
        currentIndex = 0;
        showCard(blessings[0]);
        startAutoPlay();
        return;
      }

      // If new blessings arrived, show alert and jump to it
      if (newOnes.length > 0) {
        const latest = newOnes[newOnes.length - 1];
        showNewBlessingAlert(latest);

        // Show new blessing immediately
        currentIndex = blessings.findIndex(b => b.id === latest.id);
        showCard(latest);
        startAutoPlay(); // Reset timer
      }
    });

    // Show cursor on mouse move, hide after 3s
    let cursorTimer;
    document.addEventListener('mousemove', () => {
      document.body.classList.add('show-cursor');
      clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => document.body.classList.remove('show-cursor'), 3000);
    });

    // Keyboard: F=fullscreen, Space=next
    document.addEventListener('keydown', (e) => {
      if (e.code === 'KeyF') {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen();
        }
      }
      if (e.code === 'Space') {
        e.preventDefault();
        nextCard();
        startAutoPlay();
      }
    });
    // Show floating QR when slideshow is playing
    function showFloatingQR() {
      const el = document.getElementById('qr-floating');
      el.style.display = 'block';
    }

  })();

  // Generate QR codes
  var qrOpts = { width: 250, height: 250, colorDark: '#0c1425', colorLight: '#ffffff' };
  new QRCode(document.getElementById('waiting-qr'), Object.assign({ text: 'https://hchc.co.il' }, qrOpts));
  new QRCode(document.getElementById('floating-qr-mini'), { text: 'https://hchc.co.il', width: 120, height: 120, colorDark: '#0c1425', colorLight: '#ffffff' });
  </script>
</body>
</html>
