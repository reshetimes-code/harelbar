<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>בר המצווה של הראל</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✡</text></svg>">
  <style>
    .welcome-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0a1020 0%, var(--navy) 50%, #0a1020 100%);
      padding: 20px;
    }

    .welcome-card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
    }

    .welcome-icon {
      font-size: 3rem;
      color: var(--gold);
      opacity: 0.8;
      margin-bottom: 24px;
      display: block;
    }

    .welcome-title {
      font-family: 'Assistant', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--gold-light);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .welcome-subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 36px;
      font-weight: 400;
    }

    .welcome-divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 32px;
      opacity: 0.4;
    }

    .welcome-label {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .welcome-input {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      font-family: 'Assistant', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      color: #fff;
      text-align: center;
      direction: ltr;
      letter-spacing: 2px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .welcome-input::placeholder {
      color: rgba(255,255,255,0.3);
      font-size: 1.1rem;
      letter-spacing: 0;
    }

    .welcome-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,149,62,0.15);
    }

    .welcome-error {
      color: #e55;
      font-size: 1rem;
      margin-top: 8px;
      display: none;
      font-weight: 600;
    }

    .welcome-error.show {
      display: block;
    }

    .welcome-btn {
      width: 100%;
      margin-top: 20px;
    }

    .welcome-badge {
      display: inline-block;
      margin-bottom: 24px;
      padding: 8px 28px;
      border: 1px solid rgba(184,149,62,0.25);
      border-radius: 100px;
      font-size: 1.2rem;
      color: var(--gold-light);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div style="position:fixed; top:12px; right:12px; z-index:100; display:flex; gap:8px;">
    <a href="admin.html" style="padding:6px 14px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:rgba(255,255,255,0.4); font-size:0.7rem; text-decoration:none; font-family:Assistant,sans-serif;">⚙ ניהול</a>
    <a href="screen.html" style="padding:6px 14px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:rgba(255,255,255,0.4); font-size:0.7rem; text-decoration:none; font-family:Assistant,sans-serif;">🖥 מסך</a>
  </div>

  <div class="welcome-page">
    <div class="welcome-card">
      <span class="welcome-icon">✡</span>
      <h1 class="welcome-title">ברוכים הבאים!</h1>
      <p class="welcome-subtitle">לבר המצווה של הראל</p>
      <span class="welcome-badge">מזל טוב</span>
      <div class="welcome-divider"></div>
      <p class="welcome-label">הכניסו מספר טלפון כדי להמשיך</p>
      <form id="welcome-form">
        <input type="tel" id="phone-input" class="welcome-input" placeholder="050-0000000" autocomplete="tel">
        <p class="welcome-error" id="phone-error">נא להזין מספר טלפון</p>
        <button type="submit" class="btn btn-primary welcome-btn">המשיכו לברכה</button>
      </form>
      <button type="button" class="btn btn-secondary" onclick="openShareDialog()" style="width:100%; margin-top:20px;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        שתפו לברכה נוספת
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/share.js"></script>
  <script>
    // If phone already saved, go to index
    if (sessionStorage.getItem('guest_phone')) {
      window.location.href = 'index.html';
    }

    document.getElementById('welcome-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const phone = document.getElementById('phone-input').value.trim();

      if (!phone || phone.length < 9) {
        document.getElementById('phone-error').classList.add('show');
        return;
      }

      sessionStorage.setItem('guest_phone', phone);
      window.location.href = 'index.html';
    });

    document.getElementById('phone-input').addEventListener('input', function() {
      document.getElementById('phone-error').classList.remove('show');
    });
  </script>
</body>
</html>
